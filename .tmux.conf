# remap prefix to Control + a
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Send prefix in nested sessions
bind a send-prefix

# Splits
bind - split-window -v
bind | split-window -h

# Vault Console — prefix + V prompts for a name and opens Claude Code (as me, krezel)
# in the vault root with Remote Control on. Mirrors the `vault-claude` shell function;
# edit the prefilled "vault" to e.g. "vault-research". Empty -> tmux/claude auto-name.
bind V command-prompt -p "vault session name:" -I "vault" "new-window -c /opt/docker-config/obsidian/Metcalf -n '%1' 'claude --remote-control %1'"

# Mouse mode for selection
set-option -g mouse on

# Quick pane cycling
unbind ^A
bind ^A select-pane -t :.+

# Toggle to last window with Space
bind Space last-window

# Quick session swapping
bind s choose-tree

# Window notifications
setw -g monitor-activity on
set -g visual-activity on

# Automatically rename window title
setw -g automatic-rename on

# My number keys start at 1, so start indexes at 1
set -g base-index 1
# Renumber remaining windows when one is closed (no gaps in 1-N)
set -g renumber-windows on
# Killing the last pane in a session detaches instead of destroying the session
set -g detach-on-destroy off

# Manual reload (tmux-autoreload covers it, but useful as an escape hatch)
bind r source-file ~/.tmux.conf \; display "reloaded"

# Keep key env variables around
set -g update-environment -r

# Clipboard passthrough
set -g allow-passthrough on

# Set window titles
set -g set-titles on
set -g set-titles-string 'tmux: #{pane_current_command} - #T'

# Dim inactive windows
set -g window-style 'fg=colour247,bg=black'
set -g window-active-style 'fg=colour250,bg=black'
set -g pane-border-style 'fg=colour38,bg=colour233'
set -g pane-active-border-style 'fg=colour38,bg=colour233'

#### Tmux Plugin Manager

# Official plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'tmux-plugins/tmux-logging'
set -g @plugin 'tmux-plugins/tmux-yank'
# Route every yank through tmux's buffer + OSC 52 to the host terminal,
# instead of tmux-yank's autodetected xclip/pbcopy (xclip fails silently
# on a headless server). Works on Tabby (Mac/Win) and ShellFish (iOS).
set -g @override_copy_command 'tmux load-buffer -w -'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'

# Unofficial
set -g @plugin 'erikw/tmux-powerline'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'b0o/tmux-autoreload'
set -g @plugin 'sainnhe/tmux-fzf'

set -g @plugin 'laktak/extrakto'
set -g @extrakto_grab_area 'window full'
set -g @extrakto_split_direction 'v'

set -g @plugin 'qeesung/tmux-scout'
set -g @scout-key "`"    # default: O (prefix + O) — opens the session picker
set -g status-interval 2

# prefix + ~ : jump straight to the next agent pane awaiting input (the shifted
# `~` sits right on top of the picker's `` ` `` key). Reuses scout's wait state.
bind '~' run-shell -b 'tmux-scout-next-wait'

# Match the powerline theme bg (235) on everything that otherwise falls back
# to terminal default — without these, gaps between status segments and tabs
# render as white blocks. status-bg/fg are deprecated but still honored by
# tmux and trump status-style when set to "default", so set them explicitly.
set -g status-bg colour235
set -g status-fg colour255
set -g status-style bg=colour235,fg=colour255
set -g status-left-style bg=colour235,fg=colour255
set -g status-right-style bg=colour235,fg=colour255
set -g window-status-style bg=colour235,fg=colour255
set -g window-status-current-style bg=colour235,fg=colour255
# Activity/bell defaults are "reverse" which flips bg to white. Keep bg dark
# and use an underscore for activity, bold+red fg for bell.
set -g window-status-activity-style bg=colour235,underscore
set -g window-status-bell-style bg=colour235,fg=colour203,bold

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
